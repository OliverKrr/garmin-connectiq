name: ci

# Connect IQ apps are built, type-checked and released LOCALLY — see CLAUDE.md
# and RELEASE.md (`just build`, `just package` / `just package-beta`).
#
# CI deliberately does NOT compile. monkeyc needs the Connect IQ SDK *and*
# per-device definitions, and fetching the device definitions requires a Garmin
# login. Garmin's mandatory security passcode (MFA) now blocks the headless
# login of the connect-iq-sdk-manager CLI (it has no passcode support), so a
# device build cannot run on a CI runner. CI is therefore limited to
# SDK-free sanity checks.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest & resource XML is well-formed
        run: |
          # SDK-free smoke check: every manifest / resource XML parses.
          # Uses python3 (always on the runner) so there's no apt dependency.
          python3 - <<'PY'
          import sys, glob, xml.etree.ElementTree as ET
          files = sorted(glob.glob('apps/**/*.xml', recursive=True))
          bad = []
          for f in files:
              try:
                  ET.parse(f)
              except ET.ParseError as e:
                  bad.append(f"{f}: {e}")
          print(f"checked {len(files)} XML file(s)")
          if bad:
              print("MALFORMED:")
              print("\n".join(bad))
              sys.exit(1)
          PY

      - name: Note — builds & releases run locally
        run: |
          echo "Connect IQ build / type-check / signing run locally, not in CI:"
          echo "  just build         # compile + type-check (apps/run-field)"
          echo "  just package       # signed .iq for the public Store listing"
          echo "  just package-beta  # signed .iq for the private beta listing"
          echo "See RELEASE.md for the full release + upload steps."
